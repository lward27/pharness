[workspace]
root = "."
respect_gitignore = true
additional_read_dirs = []
additional_write_dirs = []

[model]
provider = "fireworks"
model = "accounts/fireworks/models/kimi-k2p6"
api_key_env = "FIREWORKS_API_KEY"
base_url = "https://api.fireworks.ai/inference/v1"
temperature = 0.1
max_tokens = 4096
tool_protocol = "native_tools" # native_tools | json_action
reasoning_effort = "medium"

[agent]
max_turns = 40
max_context_tokens = 96000
shell_output_max_bytes = 65536
file_read_max_bytes = 262144

[execution]
target = "local_process" # local_process | kubernetes_job
environment = "local"

[cluster]
# V1 reads the tool configuration fields below; the remaining fields keep the
# config shape aligned with the future in-cluster runtime.
name = "homelab"
namespace = "pharness"
service_account = "pharness-worker"
kubectl_bin = "kubectl"
argocd_namespace = "argocd"
prometheus_url = ""
loki_url = ""
tool_timeout_ms = 15000
tool_max_output_bytes = 524288
gitops_source_of_truth = true
default_delivery_mode = "gitops" # gitops | direct_apply_break_glass
# Runtime env equivalent: PHARNESS_REGISTRY_ALIASES.
# Comma-separated registry host aliases used when comparing Tekton output images
# to deployed images, for example:
# docker-registry.registry.svc.cluster.local:5000=registry.example.com
registry_aliases = []

[rag]
enabled = false
endpoint_env = "PHARNESS_RAG_ENDPOINT"
collection = "pharness-memory"

[policy]
# Runtime env equivalent for mode: PHARNESS_POLICY_MODE.
subject = "agent:local-worker"
environment = "local"
mode = "default" # default | trusted_writes | plan | deny_all_writes
allow_read_only_shell = true
require_approval_for_writes = true
require_approval_for_network = true
require_approval_for_destructive = true
deny_privileged = true
deny_secret_access = true
command_timeout_ms = 120000

[policy.cluster]
allow_read_only_cluster_inspection = false
require_approval_for_registry_write = true
require_approval_for_tekton_run = true
require_approval_for_argocd_sync = true
require_approval_for_database_change = true
deny_secret_reads = true
deny_direct_production_apply = true

[storage]
kind = "sqlite"
path = "~/.local/share/pharness/pharness.db"
# Real coding alpha only clones local repositories listed here. The clone is
# isolated under workspace_root; Pharness does not push, merge, or touch the
# listed source checkout.
workspace_root = "~/.local/share/pharness/workspaces"
workspace_allowed_repos = []
# Exact HTTPS Git URLs only. Empty keeps in-cluster source cloning disabled.
# Credentials in URLs are rejected; private Git access gets a separate
# read-only identity in a later slice.
workspace_allowed_remote_repos = []

[worker.kubernetes]
# Relevant only when PHARNESS_WORKER_MODE=kubernetes_job. Source clones use a
# bounded per-run emptyDir, never the durable API SQLite volume.
workspace_dir = "/workspace"
workspace_size_limit = "4Gi"
workspace_ephemeral_storage_request = "2Gi"
workspace_ephemeral_storage_limit = "4Gi"
# Set after confirming node-local capacity for the target cluster.
workspace_node_hostname = ""
max_concurrent_run_jobs = 1

[api]
bind = "127.0.0.1:4777"
cors_origin = "http://127.0.0.1:5173"
