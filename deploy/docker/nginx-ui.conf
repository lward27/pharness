server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Same-origin API access for the operator console. SSE needs buffering
    # off and a long read timeout or live run streams die at the proxy.
    location /api/ {
        proxy_pass http://pharness-api:4777;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location = /health {
        proxy_pass http://pharness-api:4777;
    }

    location / {
        try_files $uri /index.html;
    }
}
