{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pharness-ui
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: pharness
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer }}
    # SSE through the operator console proxy.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.ui.host }}
      secretName: {{ .Values.ingress.uiTlsSecretName }}
  rules:
    - host: {{ .Values.ui.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pharness-ui
                port:
                  name: http
{{- end }}
{{- if and .Values.ingress.enabled .Values.ingress.apiEnabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pharness-api
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: pharness
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer }}
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.api.host }}
      secretName: {{ .Values.ingress.apiTlsSecretName }}
  rules:
    - host: {{ .Values.api.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pharness-api
                port:
                  name: http
{{- end }}
