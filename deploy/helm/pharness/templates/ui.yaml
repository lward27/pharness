apiVersion: apps/v1
kind: Deployment
metadata:
  name: pharness-ui
  namespace: {{ .Release.Namespace }}
  labels:
    app: pharness-ui
    app.kubernetes.io/part-of: pharness
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      app: pharness-ui
  template:
    metadata:
      labels:
        app: pharness-ui
        app.kubernetes.io/part-of: pharness
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ui
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: pharness-ui
  namespace: {{ .Release.Namespace }}
  labels:
    app: pharness-ui
    app.kubernetes.io/part-of: pharness
spec:
  selector:
    app: pharness-ui
  ports:
    - name: http
      port: 80
      targetPort: http
