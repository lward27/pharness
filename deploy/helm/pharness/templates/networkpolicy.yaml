{{- if .Values.networkPolicy.enabled }}
# The API accepts traffic only from inside its namespace (operator console
# proxy and worker attempts) and from the ingress controller when exposed.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pharness-api
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: pharness
spec:
  podSelector:
    matchLabels:
      app: pharness-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 4777
    {{- if and .Values.ingress.enabled .Values.ingress.apiEnabled }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 4777
    {{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pharness-ui
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: pharness
spec:
  podSelector:
    matchLabels:
      app: pharness-ui
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8080
{{- end }}
