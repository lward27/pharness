apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.worker.serviceAccount }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: pharness
    agentic.lucas.engineering/role: readonly-observer
---
# Read-only observation permissions for worker attempts, mirroring the
# hermes-readonly-observer posture: no Secret access anywhere.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pharness-readonly-observer
  labels:
    app.kubernetes.io/part-of: pharness
    agentic.lucas.engineering/role: readonly-observer
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - endpoints
      - events
      - configmaps
      - namespaces
      - persistentvolumeclaims
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch"]
  - apiGroups: ["argoproj.io"]
    resources:
      - applications
      - applicationsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["tekton.dev"]
    resources:
      - pipelineruns
      - taskruns
      - pipelines
      - tasks
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pharness-worker-readonly-observer
  labels:
    app.kubernetes.io/part-of: pharness
    agentic.lucas.engineering/role: readonly-observer
subjects:
  - kind: ServiceAccount
    name: {{ .Values.worker.serviceAccount }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pharness-readonly-observer
---
# The executor has no model credentials and no broad ClusterRole. It can create
# PipelineRuns only in the explicit target namespaces below.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.worker.tektonExecutor.serviceAccount }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: pharness
    agentic.lucas.engineering/role: tekton-executor
{{- range .Values.worker.tektonExecutor.allowedNamespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pharness-tekton-runner
  namespace: {{ . }}
  labels:
    app.kubernetes.io/part-of: pharness
rules:
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns"]
    verbs: ["create", "get", "list", "watch"]
  - apiGroups: ["tekton.dev"]
    resources: ["taskruns"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pharness-tekton-runner
  namespace: {{ . }}
  labels:
    app.kubernetes.io/part-of: pharness
subjects:
  - kind: ServiceAccount
    name: {{ $.Values.worker.tektonExecutor.serviceAccount }}
    namespace: {{ $.Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pharness-tekton-runner
{{- end }}
