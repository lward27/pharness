nameOverride: pharness

# Secrets are created out-of-band, never by this chart:
#   kubectl create secret generic pharness-fireworks \
#     --from-literal=api-key=<fireworks api key> -n pharness
#   kubectl create secret generic pharness-worker-token \
#     --from-literal=token=<random worker token> -n pharness
#   kubectl create secret generic pharness-operator-token \
#     --from-literal=tokens=<name>=<token> \
#     --from-literal=console-token=<token> -n pharness
#   htpasswd basic-auth secret for the console ingress:
#   kubectl create secret generic pharness-console-basic-auth \
#     --from-literal=auth=<htpasswd line> -n pharness

api:
  image:
    repository: registry.lucas.engineering/pharness-runtime
    tag: latest
    pullPolicy: Always
  # SQLite single-writer: keep exactly one API replica.
  replicas: 1
  host: pharness-api.lucas.engineering
  dbPath: /data/pharness.db
  persistence:
    storageClass: local-path
    size: 2Gi
  fireworksSecretName: pharness-fireworks
  workerTokenSecretName: pharness-worker-token
  operatorTokenSecretName: pharness-operator-token
  model: accounts/fireworks/models/kimi-k2p6
  policy:
    subject: agent:pharness-worker
    environment: homelab
  cluster:
    argocdNamespace: argocd
    prometheusUrl: http://prometheus-server.monitoring.svc.cluster.local:80
    lokiUrl: http://loki.monitoring.svc.cluster.local:3100
    registryAliases: docker-registry.registry.svc.cluster.local:5000=registry.lucas.engineering
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

worker:
  serviceAccount: pharness-worker
  tektonExecutor:
    serviceAccount: pharness-tekton-runner
    pollSeconds: 5
    # The executor cannot dispatch anywhere unless this allowlist is explicit.
    allowedNamespaces:
      - tekton-pipelines
  workspaceDir: /workspace
  # Coding workspaces are per-Job emptyDir volumes. They are not backed by the
  # API SQLite PVC and are reclaimed with the Job TTL.
  workspaceSizeLimit: 4Gi
  workspaceEphemeralStorageRequest: 2Gi
  workspaceEphemeralStorageLimit: 4Gi
  # Node-local storage is uneven in the homelab. Keep coding workers on the
  # roomier node until a storage-aware scheduler/controller is introduced.
  workspaceNodeHostname: ubuntu-lucas-engineering
  maxConcurrentRunJobs: 1
  # Exact HTTPS repos permitted for Kubernetes coding workspaces. Keep empty
  # until DNS/egress and the disposable dev target have been reviewed.
  workspaceAllowedRemoteRepos: []
  activeDeadlineSeconds: 3600
  ttlSecondsAfterFinished: 3600

# A permanently inert, GitOps-managed Pipeline used only by the bounded
# execution smoke. Keep this enabled only in environments where Tekton is
# installed and the executor namespace below is allowlisted.
tektonE2eSmoke:
  enabled: true
  namespace: tekton-pipelines
  pipelineName: pharness-e2e-noop
  image: alpine:3.20

ui:
  image:
    repository: registry.lucas.engineering/pharness-ui
    tag: latest
    pullPolicy: Always
  replicas: 1
  host: pharness.lucas.engineering
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

ingress:
  enabled: true
  apiEnabled: false
  className: nginx
  clusterIssuer: letsencrypt-prod
  uiTlsSecretName: pharness-lucas-engineering-tls
  apiTlsSecretName: pharness-api-lucas-engineering-tls
  # htpasswd secret gating the public console; ingress renders only when set.
  basicAuthSecretName: pharness-console-basic-auth

networkPolicy:
  enabled: true
